general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    color = rgba(0, 0, 0, 1.0)
    blur_passes = 3
    contrast = 0.89
    brightness = 0.4
    vibrancy = 0.0
    vibrancy_darkness = 1.0
}

input-field {
    monitor =
    size = 250, 50
    position = 0, 0
    halign = center
    valign = center

    inner_color = rgb(20, 20, 20)
    outer_color = rgb(255, 255, 255)
    outline_thickness = 2

    font_family = JetBrainsMono Nerd Font
    font_color = rgb(255, 255, 255)

    placeholder_text = <span foreground="##ffffff99">Password...</span>
    check_color = rgb(255, 255, 255)
    fail_color = rgb(100, 100, 100)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 5
    shadow_passes = 0
    fade_on_empty = false
}
