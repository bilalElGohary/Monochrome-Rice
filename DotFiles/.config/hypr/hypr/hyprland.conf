################
### MONITORS ###
################
monitor = DP-3, 1920x1080@60, 1590x0, 1
monitor = eDP-1, 1920x1080@60, 0x0, 1.1

###################
### MY PROGRAMS ###
###################
$terminal = alacritty
$fileManager = files
$menu = rofi -show drun
$powermenu = wlogout -b 2
$lock = hyprlock

#################
### AUTOSTART ###
#################
exec-once = $lock
exec-once = hypridle
exec-once = $terminal
exec-once = waybar & firefox & dunst & batt
exec-once = awww-daemon & sleep 2 && awww img ~/Pictures/All-PIC/fabrizio-conti-m5fHSKYSflI-unsplash.jpg

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = HYPRCURSOR_THEME,MacOS-Pixel-Dark 25
env = HYPRCURSOR_SIZE,7

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 3
    gaps_out = 3
    border_size = 1

    col.active_border = rgba(ffffffff)
    col.inactive_border = rgba(000000ff)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 5
    rounding_power = 10
    active_opacity = 0.95
    inactive_opacity = 0.6

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 10
        passes = 2
        vibrancy = 0.1696
    }
}

bezier = fantasyCurve, 0.16, 1, 0.3, 1
bezier = snapCurve, 0.05, 0.9, 0.1, 1.05
bezier = softFade, 0.42, 0, 0.58, 1

animations {
    enabled = yes

    bezier = drift, 0.23, 1, 0.32, 1
    bezier = leafFall, 0.05, 0.9, 0.1, 1.1

    animation = windows, 1, 7, leafFall, slide top
    animation = windowsIn, 1, 7, leafFall, slide top
    animation = windowsOut, 1, 5, drift, slide bottom
    animation = windowsMove, 1, 6, drift

    animation = workspaces, 1, 6, drift, slidevert 20%

    animation = border, 1, 10, default
    animation = borderangle, 1, 100, default, loop
}

dwindle {
    pseudotile = true
    preserve_split = true # You probably want this
}

input {
    sensitivity = -0.5 # Range: -1.0 to 1.0 (0 is no change)
    accel_profile = flat # Optional: Ensures no acceleration
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    vfr = false
}


#############
### INPUT ###
#############

input {
    kb_layout = us, ara
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

gestures {
    gesture = 3, vertical, workspace
    workspace_swipe_cancel_ratio = 0.15
}

device {
    name = epic-mouse-v1
    sensitivity = -0.4
}
device {
    name = synps/2-synaptics-touchpad
    enabled = true
    sensitivity = 0.2  # Adjust as needed
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, X, exec, $powermenu
bind = ALT, Tab , exec, rofi -show window 

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Move windows
bind = SHIFT, left, movewindow, l
bind = SHIFT, right, movewindow, r
bind = SHIFT, up, movewindow, u
bind = SHIFT, down, movewindow, d

# Resize windows
binde = $mainMod SHIFT, left, resizeactive, -20 0
binde = $mainMod SHIFT, right, resizeactive, 20 0
binde = $mainMod SHIFT, up, resizeactive, 0 -20
binde = $mainMod SHIFT, down, resizeactive, 0 20

# ScreenShot
bind = , Print, exec, hyprshot -m output
bind = $mainMod, Print, exec, hyprshot -m region

##############################
### WINDOWS AND WORKSPACES ###
##############################


windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

xwayland {
  force_zero_scaling = true
}

